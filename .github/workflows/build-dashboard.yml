name: Build & deploy dashboard

# Regenerates docs/index.html from briefs/*.yml and deploys it to GitHub Pages.
# Triggers on push to main when any brief, the generator, or the template
# changes. Also runnable manually for ad-hoc rebuilds.

on:
  push:
    branches: [main]
    paths:
      - 'briefs/**'
      - 'scripts/build_dashboard.py'
      - 'templates/**'
  workflow_dispatch:

# Permissions required by actions/deploy-pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Don't cancel an in-flight deployment; wait for it to finish.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build dashboard
        run: python scripts/build_dashboard.py

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
